<head>

<title>Kam's Plan</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#0A0A0F;color:#E2E8F0;font-family:-apple-system,BlinkMacSystemFont,sans-serif;min-height:100vh;padding-bottom:90px;max-width:480px;margin:0 auto}
button{cursor:pointer;font-family:inherit}
input,textarea,select{font-family:inherit;outline:none;color:#E2E8F0}
input::placeholder,textarea::placeholder{color:#475569}

#header{background:#0F0F1A;border-bottom:1px solid #1E1E2E;padding:20px 20px 0}
.eyebrow{font-size:10px;letter-spacing:3px;color:#F59E0B;font-weight:600;margin-bottom:4px}
#pageTitle{font-size:26px;font-weight:800;letter-spacing:-0.5px;margin-bottom:16px}
#dayTabs{display:flex;overflow-x:auto;scrollbar-width:none}
#dayTabs::-webkit-scrollbar{display:none}
.dtab{flex:0 0 auto;background:none;border:none;border-bottom:2px solid transparent;color:#475569;font-size:11px;font-weight:600;letter-spacing:1.5px;padding:10px 14px}
.dtab.on{color:#F59E0B;border-bottom-color:#F59E0B}

.tab{display:none;padding:16px}
.tab.on{display:block}

#bottomNav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#0F0F1A;border-top:1px solid #1E1E2E;display:flex;padding:8px 0 max(16px,env(safe-area-inset-bottom));z-index:10}
.nbtn{flex:1;background:none;border:none;color:#475569;display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px 0}
.nbtn.on{color:#F59E0B}
.nicon{font-size:20px;line-height:1}
.nlabel{font-size:10px;font-weight:600;letter-spacing:1px}

.inp{display:block;background:rgba(255,255,255,0.07);border:1px solid #2D2D3A;border-radius:8px;font-size:13px;padding:9px 12px;width:100%;color:#E2E8F0}
select.inp option{background:#1a1a2e}

.banner{background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.2);border-radius:12px;padding:16px;margin-bottom:16px}
.banner-btn{background:none;border:none;color:#F59E0B;font-size:13px;font-weight:600;padding:0;display:block;width:100%;text-align:left}
.banner-text{font-size:13px;color:#CBD5E1;line-height:1.6}

#blockList{display:flex;flex-direction:column;gap:8px}

.blk{border-radius:10px;border:1px solid #1E1E2E;border-left:3px solid #94A3B8;background:rgba(255,255,255,0.03);overflow:hidden}
.blk-row{display:flex;align-items:center;gap:12px;padding:12px 14px;cursor:pointer;user-select:none}
.blk-time{flex:0 0 auto;text-align:right;min-width:60px}
.blk-t{font-size:11px;font-weight:600}
.blk-d{font-size:10px;color:#334155;margin-top:2px}
.blk-sep{width:1px;height:30px;background:#1E1E2E;flex:0 0 auto}
.blk-info{flex:1;min-width:0}
.blk-name{font-size:14px;font-weight:600;color:#E2E8F0}
.blk-icons{font-size:13px;margin-top:3px;min-height:18px}
.blk-arr{font-size:18px;color:#475569;transition:transform .2s;flex:0 0 auto}

.blk-body{display:none;padding:0 14px 14px;border-top:1px solid #1E1E2E}
.blk-desc{font-size:13px;color:#94A3B8;line-height:1.6;margin:10px 0}
.tip-area{background:rgba(255,255,255,0.04);border-radius:8px;padding:12px;margin-bottom:10px}
.tip-btn{background:none;border:none;color:#60A5FA;font-size:12px;padding:0}
.tip-text{font-size:12px;color:#CBD5E1;line-height:1.6}
.blk-btns{display:flex;gap:8px}
.edit-btn{flex:1;background:rgba(255,255,255,0.06);color:#94A3B8;border:none;border-radius:8px;padding:9px;font-size:12px}
.del-btn{background:rgba(239,68,68,0.1);color:#EF4444;border:none;border-radius:8px;padding:9px 16px;font-size:12px}

.edit-form{padding:14px;display:flex;flex-direction:column;gap:8px}
.frow{display:flex;gap:8px}
.frow .inp{flex:1}
.save-btn{flex:1;background:#F59E0B;color:#0A0A0F;border:none;border-radius:8px;padding:10px;font-weight:700;font-size:13px}
.cnc-btn{flex:1;background:rgba(255,255,255,0.06);color:#94A3B8;border:none;border-radius:8px;padding:10px;font-size:13px}

.add-form-wrap{background:rgba(255,255,255,0.03);border:1px solid #2D2D3A;border-radius:10px;padding:14px;margin-top:12px;display:flex;flex-direction:column;gap:8px}
.ghost-btn{width:100%;margin-top:12px;background:rgba(255,255,255,0.02);border:1px dashed #2D2D3A;border-radius:10px;color:#475569;font-size:13px;padding:14px}

.sec-label{font-size:10px;letter-spacing:2px;font-weight:600;margin-bottom:8px}
.goal-sec{margin-bottom:20px}
.goal-list{display:flex;flex-direction:column;gap:8px}
.goal-item{border-radius:10px;border:1px solid #1E1E2E;background:rgba(255,255,255,0.02);overflow:hidden}
.goal-row{display:flex;align-items:center;gap:12px;padding:12px 14px}
.goal-toggle{display:flex;align-items:center;gap:12px;flex:1;cursor:pointer;user-select:none}
.goal-emoji{font-size:20px}
.goal-lbl{font-size:14px;font-weight:500;color:#475569}
.goal-box{width:22px;height:22px;border-radius:6px;background:#1E1E2E;display:flex;align-items:center;justify-content:center;flex:0 0 auto;font-size:13px;font-weight:800;color:#0A0A0F}
.goal-x{background:none;border:none;color:#334155;font-size:20px;line-height:1;padding:0 0 0 6px}
.confirm-wrap{padding:12px 14px}
.confirm-q{font-size:12px;color:#94A3B8;margin-bottom:10px}
.confirm-row{display:flex;gap:8px}
.yes-btn{flex:1;background:rgba(239,68,68,0.15);color:#EF4444;border:1px solid rgba(239,68,68,0.3);border-radius:8px;padding:9px;font-size:12px;font-weight:600}
.no-btn{flex:1;background:rgba(255,255,255,0.05);color:#94A3B8;border:none;border-radius:8px;padding:9px;font-size:12px}

.add-goal-form{background:rgba(255,255,255,0.03);border:1px solid #2D2D3A;border-radius:10px;padding:16px;margin-top:8px;display:flex;flex-direction:column;gap:12px}
.form-lbl{font-size:11px;color:#475569;margin-bottom:6px}
.icon-grid{display:flex;flex-wrap:wrap;gap:6px}
.icon-opt{background:rgba(255,255,255,0.04);border:1px solid transparent;border-radius:8px;padding:6px 8px;font-size:18px}
.icon-opt.on{background:rgba(245,158,11,0.2);border-color:#F59E0B}
.cat-grid{display:flex;gap:6px;flex-wrap:wrap}
.cat-opt{background:rgba(255,255,255,0.04);border:1px solid transparent;border-radius:8px;padding:6px 10px;font-size:11px;color:#475569;font-weight:400}

.wday{margin-bottom:20px}
.wday-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.wday-name{font-size:12px;font-weight:700;letter-spacing:1.5px;color:#64748B}
.wday-name.today{color:#F59E0B}
.wview-btn{background:none;border:none;color:#475569;font-size:11px}
.wblk{display:flex;align-items:center;gap:8px;border-radius:4px;padding:6px 10px;margin-bottom:4px;border-left:2px solid #94A3B8;background:rgba(255,255,255,0.02)}
.wtime{font-size:11px;min-width:58px;flex:0 0 auto}
.wtitle{font-size:12px;color:#94A3B8}
</style>

var tips = {};
var openId = null;
var editId = null;
var delGoal = null;
var showAB = false;
var showAG = false;
var ngIcon = "⭐";
var ngCat = "mind";
var curTab = "today";
var today = new Date().getDay();
var aDay = (today === 0) ? 6 : today - 1;

function tm(t){
  var p=t.split(":"); var h=parseInt(p[0]); var m=p[1];
  return (h%12||12)+":"+m+" "+(h>=12?"PM":"AM");
}
function mins(t){var p=t.split(":"); return parseInt(p[0])*60+parseInt(p[1]);}
function x(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

function goTab(name){
  curTab=name;
  ["today","goals","week"].forEach(function(n){
    document.getElementById(n+"Tab").className="tab"+(n===name?" on":"");
    document.getElementById("nb"+n.charAt(0).toUpperCase()+n.slice(1)).className="nbtn"+(n===name?" on":"");
  });
  var titles={today:DF[aDay],goals:"Your Goals",week:"This Week"};
  document.getElementById("pageTitle").textContent=titles[name];
  document.getElementById("dayTabs").style.display=name==="today"?"flex":"none";
  if(name==="goals"){renderGoals();}
  if(name==="week"){renderWeek();}
}

function renderDayTabs(){
  var html="";
  for(var i=0;i<DS.length;i++){
    html+='<button class="dtab'+(i===aDay?" on":"")+'" onclick="setDay('+i+')">'+DS[i]+'</button>';
  }
  document.getElementById("dayTabs").innerHTML=html;
}

function setDay(i){
  aDay=i;
  openId=null;
  document.getElementById("pageTitle").textContent=DF[i];
  document.getElementById("focusBtn").style.display="block";
  document.getElementById("focusText").style.display="none";
  renderDayTabs();
  renderBlocks();
}

function getTodayBlocks(){
  var out=[];
  for(var i=0;i<blocks.length;i++){
    var b=blocks[i];
    if(b.days.indexOf(aDay)===-1) continue;
    var hasGoal=false;
    for(var j=0;j<b.gs.length;j++){if(AG[b.gs[j]]){hasGoal=true;break;}}
    if(hasGoal||b.cat==="routine") out.push(b);
  }
  out.sort(function(a,b){return mins(a.t)-mins(b.t);});
  return out;
}

function getGoalIcons(gs){
  var out=[];
  for(var i=0;i<gs.length;i++){
    if(!AG[gs[i]]) continue;
    for(var j=0;j<goals.length;j++){
      if(goals[j].id===gs[i]){out.push(goals[j].ico);break;}
    }
  }
  return out.join(" ");
}

      html+='<input class="inp" id="ef_d" type="number" value="'+b.dur+'" placeholder="Mins"/></div>';
      html+='<textarea class="inp" id="ef_desc" rows="2" placeholder="Notes">'+x(b.desc)+'</textarea>';

function toggleBlk(id){openId=(openId===id?null:id);renderBlocks();}
function startEdit(id){editId=id;openId=null;renderBlocks();}
function cancelEdit(){editId=null;renderBlocks();}
function saveEdit(id){
var n=document.getElementById(“ef_n”).value;
var t=document.getElementById(“ef_t”).value;
var d=parseInt(document.getElementById(“ef_d”).value)||30;
var desc=document.getElementById(“ef_desc”).value;
for(var i=0;i<blocks.length;i++){
if(blocks[i].id===id){blocks[i].name=n;blocks[i].t=t;blocks[i].dur=d;blocks[i].desc=desc;break;}
}
editId=null;renderBlocks();
}
function delBlock(id){
blocks=blocks.filter(function(b){return b.id!==id;});
openId=null;renderBlocks();
}

‘<option value="social">Social</option>’+
‘</select>’+
‘<textarea class="inp" id="nb_desc" rows="2" placeholder="Notes (optional)"></textarea>’+
‘<div class="frow"><button class="save-btn" onclick="addBlock()">Add Block</button>’+
‘<button class="cnc-btn" onclick="closeAB()">Cancel</button></div>’+
‘</div>’;
} else {
el.innerHTML=’<button class="ghost-btn" onclick="openAB()">+ Add a block</button>’;
}
}
function openAB(){showAB=true;renderAddBlock();}
function closeAB(){showAB=false;renderAddBlock();}
function addBlock(){
var n=document.getElementById(“nb_n”).value.trim();
if(!n) return;
var t=document.getElementById(“nb_t”).value||“09:00”;
var d=parseInt(document.getElementById(“nb_d”).value)||30;
var c=document.getElementById(“nb_c”).value;
var desc=document.getElementById(“nb_desc”).value;
blocks.push({id:Date.now(),t:t,dur:d,name:n,cat:c,desc:desc,gs:[“G1”],days:[0,1,2,3,4,5,6]});
showAB=false;renderBlocks();
}

async function fetchTip(bid){
var b=null;
for(var i=0;i<blocks.length;i++){if(blocks[i].id===bid){b=blocks[i];break;}}
if(!b) return;
var tkey=bid+”-”+aDay;
var el=document.querySelector(”#B”+bid+” .tip-area”);
if(el) el.innerHTML=’<div class="tip-text" style="color:#F59E0B">⏳ Getting tip…</div>’;
var gls=[];
for(var i=0;i<b.gs.length;i++){
if(!AG[b.gs[i]]) continue;
for(var j=0;j<goals.length;j++){if(goals[j].id===b.gs[i]){gls.push(goals[j].lbl);break;}}
}
try{
var res=await fetch(“https://api.anthropic.com/v1/messages”,{
method:“POST”,headers:{“Content-Type”:“application/json”},
body:JSON.stringify({model:“claude-sonnet-4-20250514”,max_tokens:200,
system:“Direct no-fluff personal coach. User is Kam, 26, ACA-qualified finance professional building an AI business and UK Trust Manager app. Lost his father in 2023. 2-3 sentences max. Specific and personal.”,
messages:[{role:“user”,content:“Tip for: “+b.name+” on “+DF[aDay]+”. Goals: “+gls.join(”, “)+”. Context: “+b.desc}]
})
});
var d=await res.json();
tips[tkey]=(d.content&&d.content[0]&&d.content[0].text)||“Focus and execute.”;
}catch(e){tips[tkey]=“Focus on this block. Consistency beats perfection.”;}
renderBlocks();
}

async function getDailyTip(){
var btn=document.getElementById(“focusBtn”);
btn.textContent=“⏳ Loading…”;
btn.disabled=true;
var gls=[];
for(var i=0;i<goals.length;i++){if(AG[goals[i].id])gls.push(goals[i].lbl);}
try{
var res=await fetch(“https://api.anthropic.com/v1/messages”,{
method:“POST”,headers:{“Content-Type”:“application/json”},
body:JSON.stringify({model:“claude-sonnet-4-20250514”,max_tokens:200,
system:“Direct motivating coach. Kam, 26, ACA-qualified, building AI business, lost his dad in 2023. Real not generic. Max 3 sentences.”,
messages:[{role:“user”,content:“Daily focus for “+DF[aDay]+”. Active goals: “+gls.join(”, “)+”.”}]
})
});
var d=await res.json();
var txt=(d.content&&d.content[0]&&d.content[0].text)||“Show up. Do the work. That’s it.”;
btn.style.display=“none”;
var ft=document.getElementById(“focusText”);
ft.textContent=txt;
ft.style.display=“block”;
}catch(e){
btn.textContent=“✦ Get today’s focus message”;
btn.disabled=false;
}
}

function renderGoals(){
var cats=[“mind”,“body”,“career”,“learning”,“social”];
var html=””;
for(var ci=0;ci<cats.length;ci++){
var cat=cats[ci];
var c=CC[cat];
var cg=goals.filter(function(g){return g.cat===cat;});
if(!cg.length) continue;
html+=’<div class="goal-sec">’;
html+=’<div class="sec-label" style="color:'+c.col+'">’+CL[cat].toUpperCase()+’</div>’;
html+=’<div class="goal-list">’;
for(var gi=0;gi<cg.length;gi++){
var g=cg[gi];
var on=!!AG[g.id];
if(delGoal===g.id){
html+=’<div class="goal-item" style="'+(on?'background:'+c.bg+';border-color:'+c.bd:'')+'">’;
html+=’<div class="confirm-wrap"><p class="confirm-q">Remove “’+x(g.lbl)+’”?</p>’;
html+=’<div class="confirm-row"><button class="yes-btn" onclick="doDelGoal(\''+g.id+'\')">Remove</button>’;
html+=’<button class="no-btn" onclick="cancelDel()">Cancel</button></div></div></div>’;
} else {
html+=’<div class="goal-item" style="'+(on?'background:'+c.bg+';border-color:'+c.bd:'')+'">’;
html+=’<div class="goal-row">’;
html+=’<div class="goal-toggle" onclick="togGoal(\''+g.id+'\')">’;
html+=’<span class="goal-emoji">’+g.ico+’</span>’;
html+=’<span class=“goal-lbl” style=“color:’+(on?”#E2E8F0”:”#475569”)+’”>’+x(g.lbl)+’</span>’;
html+=’<div class=“goal-box” style=“background:’+(on?c.col:”#1E1E2E”)+’”>’+(on?‘✓’:’’)+’</div>’;
html+=’</div>’;
html+=’<button class="goal-x" onclick="askDel(\''+g.id+'\')">×</button>’;
html+=’</div></div>’;
}
}
html+=’</div></div>’;
}
document.getElementById(“goalsList”).innerHTML=html;
renderAddGoal();
}

function togGoal(id){AG[id]=!AG[id];renderGoals();}
function askDel(id){delGoal=id;renderGoals();}
function cancelDel(){delGoal=null;renderGoals();}
function doDelGoal(id){
goals=goals.filter(function(g){return g.id!==id;});
delete AG[id];
delGoal=null;
renderGoals();
}

function renderAddGoal(){
var el=document.getElementById(“addGoalWrap”);
if(showAG){
var html=’<div class="add-goal-form">’;
html+=’<div style="font-size:12px;font-weight:600;color:#94A3B8;letter-spacing:1px">NEW GOAL</div>’;
html+=’<input class="inp" id="ng_lbl" placeholder="Goal name e.g. Learn to cook"/>’;
html+=’<div><div class="form-lbl">Pick an icon</div><div class="icon-grid">’;
for(var i=0;i<ICONS.length;i++){
html+=’<button class=“icon-opt’+(ICONS[i]===ngIcon?” on”:””)+’” onclick=“setNGI('’+ICONS[i]+’')”>’+ICONS[i]+’</button>’;
}
html+=’</div></div>’;
html+=’<div><div class="form-lbl">Category</div><div class="cat-grid">’;
var cats=[“mind”,“body”,“career”,“learning”,“social”];
for(var ci=0;ci<cats.length;ci++){
var cat=cats[ci];
var c=CC[cat];
var sel=ngCat===cat;
html+=’<button class=“cat-opt’+(sel?” on”:””)+’” onclick=“setNGC('’+cat+’')” style=”’+(sel?‘background:’+c.bg+’;border-color:’+c.bd+’;color:’+c.col+’;font-weight:600’:’’)+’”>’+CL[cat]+’</button>’;
}
html+=’</div></div>’;
html+=’<div class="frow"><button class="save-btn" onclick="addGoal()">Add Goal</button>’;
html+=’<button class="cnc-btn" onclick="closeAG()">Cancel</button></div>’;
html+=’</div>’;
el.innerHTML=html;
} else {
el.innerHTML=’<button class="ghost-btn" onclick="openAG()">+ Add a new goal</button>’;
}
}
function setNGI(ic){ngIcon=ic;renderAddGoal();}
function setNGC(cat){ngCat=cat;renderAddGoal();}
function openAG(){showAG=true;renderAddGoal();}
function closeAG(){showAG=false;ngIcon=“⭐”;ngCat=“mind”;renderAddGoal();}
function addGoal(){
var lbl=document.getElementById(“ng_lbl”).value.trim();
if(!lbl) return;
var id=“C”+Date.now();
goals.push({id:id,lbl:lbl,ico:ngIcon,cat:ngCat});
AG[id]=true;
showAG=false;ngIcon=“⭐”;ngCat=“mind”;
renderGoals();
}

function renderWeek(){
var html=””;
for(var di=0;di<DF.length;di++){
var dayBlocks=[];
for(var i=0;i<blocks.length;i++){
var b=blocks[i];
if(b.days.indexOf(di)===-1) continue;
var ok=b.cat===“routine”;
if(!ok){for(var j=0;j<b.gs.length;j++){if(AG[b.gs[j]]){ok=true;break;}}}
if(ok) dayBlocks.push(b);
}
dayBlocks.sort(function(a,b){return mins(a.t)-mins(b.t);});
html+=’<div class="wday">’;
html+=’<div class="wday-hdr"><div class=“wday-name’+(di===aDay?” today”:””)+’”>’+ DF[di].toUpperCase()+’</div>’;
html+=’<button class="wview-btn" onclick="setDay('+di+');goTab(\'today\')">View →</button></div>’;
for(var i=0;i<dayBlocks.length;i++){
var b=dayBlocks[i];
var c=CC[b.cat]||CC.routine;
html+=’<div class="wblk" style="border-left-color:'+c.col+'">’;
html+=’<span class="wtime" style="color:'+c.col+'">’+tm(b.t)+’</span>’;
html+=’<span class="wtitle">’+x(b.name)+’</span></div>’;
}
html+=’</div>’;
}
document.getElementById(“weekView”).innerHTML=html;
}

// Init
renderDayTabs();
renderBlocks();
</script>
